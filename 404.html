    .error-page {
      min-height: calc(100vh - 64px - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '';
      position: absolute;
      top: -120px;
      left: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .error-page::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.06) 0%, transparent 60%);
      border-radius: 50%;
      pointer-events: none;
    }

    .error-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
    }

    .error-code {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 120px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #3b82f6, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: -4px;
      animation: glitch 3s ease-in-out infinite;
    }

    @keyframes glitch {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.8; transform: translateX(-2px); }
      94% { opacity: 1; transform: translateX(2px); }
      95% { opacity: 0.9; transform: translateX(0); }
    }

    .error-emoji {
      font-size: 48px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .error-title {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 15px;
      color: #64748b;
      line-height: 1.8;
      margin-bottom: 36px;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
      cursor: pointer;
      border: none;
    }

    .error-btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
    }

    .error-btn-primary:hover {
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.4);
      transform: translateY(-2px);
    }

    .error-btn-outline {
      background: #fff;
      color: #3b82f6;
      border: 1.5px solid #e2e8f0;
    }

    .error-btn-outline:hover {
      border-color: #3b82f6;
      background: #f8fafc;
      transform: translateY(-2px);
    }

    .error-shortcuts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .error-shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #f1f5f9;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }

    .error-shortcut:hover {
      border-color: #cbd5e1;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      transform: translateY(-2px);
    }

    .error-shortcut-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .error-shortcut-name {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
    }

    @media (max-width: 600px) {
      .error-code {
        font-size: 80px;
        letter-spacing: -2px;
      }

      .error-emoji {
        font-size: 36px;
      }

      .error-title {
        font-size: 20px;
      }

      .error-desc {
        font-size: 14px;
      }

      .error-shortcuts {

        gap: 10px;
      }

      .error-page {
        padding: 40px 20px;
      }

      .error-actions {
        flex-direction: column;
        align-items: center;
      }

      .error-btn {
        width: 100%;
        max-width: 240px;
        justify-content: center;
      }
