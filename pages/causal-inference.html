  <script>
  // ===== 因果推断封面：动态网络关系图 (DAG) =====
  (function() {
    var canvas = document.getElementById('ciHeroCanvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var W, H;
    var nodes = [];
    var edges = [];
    var mouse = { x: -999, y: -999 };
    var animFrame;

    // 因果推断核心概念节点
    var labels = [
      'Treatment', 'Outcome', 'Confounder', 'IV', 'Mediator',
      'Collider', 'ATE', 'CATE', 'Propensity', 'Control',
      'DID', 'RDD', 'Matching', 'IPW', 'CUPED'
    ];

    function resize() {
      var rect = canvas.parentElement.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function initNodes() {
      nodes = [];
      edges = [];
      var count = labels.length;
      // 将节点分三层分布，避免集中在一侧
      var layers = [
        { indices: [0, 1, 2, 3, 4],   rFactor: 0.18 }, // 内层
        { indices: [5, 6, 7, 8, 9],   rFactor: 0.32 }, // 中层
        { indices: [10, 11, 12, 13, 14], rFactor: 0.42 }  // 外层
      ];
      layers.forEach(function(layer) {
        var n = layer.indices.length;
        layer.indices.forEach(function(idx, j) {
          // 在各层内均匀分布角度，加随机偏移
          var angle = (Math.PI * 2 / n) * j + (Math.PI * 2 / n) * 0.3 * (Math.random() - 0.5);
          // 各层使用不同半径
          var rx = W * layer.rFactor + (Math.random() - 0.5) * W * 0.06;
          var ry = H * layer.rFactor + (Math.random() - 0.5) * H * 0.06;
          nodes[idx] = {
            x: W / 2 + Math.cos(angle) * rx,
            y: H / 2 + Math.sin(angle) * ry,
            vx: (Math.random() - 0.5) * 0.25,
            vy: (Math.random() - 0.5) * 0.25,
            r: 18 + Math.random() * 10,
            label: labels[idx],
            hue: 230 + idx * 8,
            alpha: 0.6 + Math.random() * 0.3,
            phase: Math.random() * Math.PI * 2
          };
        });
      });
      // 生成因果关系边（有向边），模拟 DAG 结构
      var dagEdges = [
        [0, 1], [2, 0], [2, 1], [3, 0], [0, 4], [4, 1],
        [2, 5], [0, 6], [6, 7], [8, 0], [9, 1],
        [10, 1], [11, 1], [12, 0], [13, 1], [14, 6]
      ];
      dagEdges.forEach(function(e) {
        if (e[0] < count && e[1] < count) {
          edges.push({ from: e[0], to: e[1], progress: 0, speed: 0.003 + Math.random() * 0.004 });
        }
      });
    }

    function drawArrow(x1, y1, x2, y2, alpha, progress) {
      var dx = x2 - x1, dy = y2 - y1;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) return;
      // 缩短箭头，不画到圆心
      var fromR = nodes[0].r || 20;
      var toR = fromR;
      var sx = x1 + (dx / dist) * fromR;
      var sy = y1 + (dy / dist) * fromR;
      var ex = x2 - (dx / dist) * toR;
      var ey = y2 - (dy / dist) * toR;

      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = 'rgba(139, 92, 246, ' + (alpha * 0.25) + ')';
      ctx.lineWidth = 1.2;
      ctx.stroke();

      // 箭头头部
      var headLen = 8;
      var angle = Math.atan2(ey - sy, ex - sx);
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex - headLen * Math.cos(angle - 0.35), ey - headLen * Math.sin(angle - 0.35));
      ctx.lineTo(ex - headLen * Math.cos(angle + 0.35), ey - headLen * Math.sin(angle + 0.35));
      ctx.closePath();
      ctx.fillStyle = 'rgba(139, 92, 246, ' + (alpha * 0.35) + ')';
      ctx.fill();

      // 流动粒子效果
      var px = sx + (ex - sx) * progress;
      var py = sy + (ey - sy) * progress;
      ctx.beginPath();
      ctx.arc(px, py, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(99, 102, 241, ' + (alpha * 0.8) + ')';
      ctx.fill();
    }

    function draw(t) {
      ctx.clearRect(0, 0, W, H);

      // 画边（有向箭头 + 流动粒子）
      edges.forEach(function(e) {
        var a = nodes[e.from], b = nodes[e.to];
        e.progress = (e.progress + e.speed) % 1;
        var d = Math.sqrt((a.x - mouse.x) ** 2 + (a.y - mouse.y) ** 2);
        var hoverAlpha = d < 150 ? 1.2 : 0.7;
        drawArrow(a.x, a.y, b.x, b.y, hoverAlpha, e.progress);
      });

      // 画节点
      nodes.forEach(function(n, i) {
        // 缓慢浮动
        n.x += n.vx + Math.sin(t * 0.001 + n.phase) * 0.15;
        n.y += n.vy + Math.cos(t * 0.001 + n.phase * 1.3) * 0.12;
        // 边界反弹
        if (n.x < n.r) { n.x = n.r; n.vx *= -1; }
        if (n.x > W - n.r) { n.x = W - n.r; n.vx *= -1; }
        if (n.y < n.r) { n.y = n.r; n.vy *= -1; }
        if (n.y > H - n.r) { n.y = H - n.r; n.vy *= -1; }

        var d = Math.sqrt((n.x - mouse.x) ** 2 + (n.y - mouse.y) ** 2);
        var hover = d < 120;
        var scale = hover ? 1.15 : 1;
        var glow = hover ? 0.25 : 0.08;

        // 光晕
        var grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * scale * 2.5);
        grad.addColorStop(0, 'rgba(99, 102, 241, ' + glow + ')');
        grad.addColorStop(1, 'rgba(99, 102, 241, 0)');
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * scale * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // 节点圆
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * scale, 0, Math.PI * 2);
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        ctx.fillStyle = isDark
          ? 'rgba(30, 41, 59, ' + (n.alpha * 0.9) + ')'
          : 'rgba(255, 255, 255, ' + (n.alpha * 0.9) + ')';
        ctx.fill();
        ctx.strokeStyle = hover ? 'rgba(99, 102, 241, 0.6)' : 'rgba(139, 92, 246, 0.2)';
        ctx.lineWidth = hover ? 2 : 1;
        ctx.stroke();

        // 标签文字
        ctx.font = (hover ? '600 ' : '500 ') + '10px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = hover
          ? (isDark ? '#a5b4fc' : '#4f46e5')
          : (isDark ? '#94a3b8' : '#64748b');
        ctx.fillText(n.label, n.x, n.y);
      });

      animFrame = requestAnimationFrame(draw);
    }

    function onMouse(e) {
      var rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
    }

    function onLeave() {
      mouse.x = -999;
      mouse.y = -999;
    }

    resize();
    initNodes();
    animFrame = requestAnimationFrame(draw);

    canvas.addEventListener('mousemove', onMouse);
    canvas.addEventListener('mouseleave', onLeave);
    window.addEventListener('resize', function() {
      resize();
      initNodes();
    });

    // 统计方法数和公式数
    fetch('../data/causal-inference.json?v=20260413e').then(function(r) { return r.json(); }).then(function(data) {
      var methods = 0, formulas = 0;
      data.modules.forEach(function(m) {
        if (m.status === 'active') {
          m.sections.forEach(function(s) {
            if (s.operators) {
              methods += s.operators.length;
              s.operators.forEach(function(op) {
                if (op.principle && op.principle.sections) {
                  op.principle.sections.forEach(function(ps) {
                    if (ps.type === 'formula') formulas++;
                  });
                }
              });
            }
          });
        }
      });
      var el1 = document.getElementById('ciStatMethods');
      var el2 = document.getElementById('ciStatFormulas');
      if (el1) el1.textContent = methods;
      if (el2) el2.textContent = formulas;
    }).catch(function() {});
  })();
  </script>

  <script>
    // ============================================================
    // 因果推断工具箱：原理 + 可折叠 Python 代码
    // ============================================================
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // 渲染原理 section 的 HTML（连续公式自动并排）
    // 返回 { principle: '...', examples: '...', tocItems: [...] }
    // tocItems 收集文章内部结构，用于右侧 TOC
    function renderPrinciple(principle, opId) {
      if (!principle || !principle.sections) return { principle: '', examples: '', tocItems: [] };
      var principleHtml = '';
      var examplesHtml = '';
      var tocItems = [];
      var items = principle.sections;
      var i = 0;
      var stepCounter = 0; // 段落计数器，用于生成锚点 ID

      while (i < items.length) {
        var s = items[i];
        if (s.type === 'text') {
          if (s.content.indexOf('💡') === 0) {
            // 示例段落
            var exAnchorId = opId + '-example-' + stepCounter;
            stepCounter++;
            examplesHtml += '<p class="ci-principle-text" id="' + exAnchorId + '">' + s.content.replace(/^💡\s*举例[：:]\s*/, '') + '</p>';
          } else {
            // 检测 <b>Step N：标题</b> 或 <b>标题</b> 开头的段落
            var stepMatch = s.content.match(/^<b>(Step\s*\d+[：:．.]\s*)([^<]+)<\/b>/i);
            var boldMatch = !stepMatch && s.content.match(/^<b>([^<]+)<\/b>/);
            var anchorId = opId + '-p-' + stepCounter;
            stepCounter++;

            if (stepMatch) {
              // Step 标题段落：拆为独立标题 + 正文
              var stepTitle = stepMatch[1] + stepMatch[2];
              var stepBody = s.content.replace(/^<b>[^<]+<\/b>\s*[—\-–：:．.]*\s*/, '');
              principleHtml += '<div class="ci-labeled-section ci-toc-anchor" id="' + anchorId + '">' +
                '<h5 class="ci-section-heading">' + stepTitle + '</h5>' +
                (stepBody ? '<p class="ci-principle-text">' + stepBody + '</p>' : '') +
              '</div>';
              tocItems.push({ id: anchorId, title: stepTitle, type: 'step' });
            } else if (boldMatch) {
              // 粗体标题段落：也拆为独立标题 + 正文
              var boldTitle = boldMatch[1];
              var boldBody = s.content.replace(/^<b>[^<]+<\/b>\s*[—\-–：:．.]*\s*/, '');
              principleHtml += '<div class="ci-labeled-section ci-toc-anchor" id="' + anchorId + '">' +
                '<h5 class="ci-section-heading">' + boldTitle + '</h5>' +
                (boldBody ? '<p class="ci-principle-text">' + boldBody + '</p>' : '') +
              '</div>';
              tocItems.push({ id: anchorId, title: boldTitle, type: 'step' });
            } else {
              principleHtml += '<p class="ci-principle-text" id="' + anchorId + '">' + s.content + '</p>';
            }
          }
          i++;
        } else if (s.type === 'formula') {
          // 收集连续的 formula
          var formulas = [];
          while (i < items.length && items[i].type === 'formula') {
            formulas.push(items[i]);
            i++;
          }
          var formulaAnchorId = opId + '-f-' + stepCounter;
          stepCounter++;
          var colsClass = formulas.length === 1 ? ' cols-1' : (formulas.length >= 3 ? ' cols-3' : '');
          if (formulas.length > 3) colsClass = '';
          principleHtml += '<div class="ci-formula-grid' + colsClass + '" id="' + formulaAnchorId + '">';

          formulas.forEach(function(f, idx) {
            principleHtml += '<div class="ci-formula-block">' +
              '<span class="ci-formula-label">' + f.label + '</span>' +
              '<div class="ci-formula-expr" data-latex="' + escapeHtml(f.latex) + '"></div>';
            if (f.vars && f.vars.length > 0) {
              principleHtml += '<div class="ci-formula-vars">';
              f.vars.forEach(function(v) {
                principleHtml += '<div><code>' + escapeHtml(v.symbol) + '</code> — ' + v.desc + '</div>';
              });
              principleHtml += '</div>';
            }
            principleHtml += '</div>';
          });
          // 公式组后紧跟的 text（解读 + 示例）都收进公式区
          // 但如果是 Step 标题或粗体标题，则不吸收（留给主循环处理为独立标题）
          var noteContent = '';
          var stepHeadingRe = /^<b>(Step\s*\d+|[^<]+)<\/b>/i;
          // 先收解读文字（跳过 Step/粗体标题开头的段落）
          if (i < items.length && items[i].type === 'text' && items[i].content.indexOf('💡') !== 0 && !stepHeadingRe.test(items[i].content)) {
            noteContent += items[i].content;
            i++;
          }
          // 再收紧跟的示例，融为一段
          if (i < items.length && items[i].type === 'text' && items[i].content.indexOf('💡') === 0) {
            var exText = items[i].content.replace(/^💡\s*举例[：:]\s*/, '');
            noteContent += (noteContent ? '<br><span class="ci-note-example">💡 ' + exText + '</span>' : '<span class="ci-note-example">💡 ' + exText + '</span>');
            i++;
          }
          if (noteContent) {
            principleHtml += '<p class="ci-formula-note">' + noteContent + '</p>';
          }
          principleHtml += '</div>';
        } else if (s.type === 'keypoint') {
          var kpAnchorId = opId + '-kp-' + stepCounter;
          stepCounter++;
          principleHtml += '<div class="ci-keypoint" id="' + kpAnchorId + '">' +
            '<div class="ci-keypoint-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg> ' + s.title + '</div>' +
            '<p class="ci-keypoint-content">' + s.content + '</p>' +
          '</div>';
          tocItems.push({ id: kpAnchorId, title: s.title, type: 'keypoint' });
          i++;
        } else {
          i++;
        }
      }
      return { principle: principleHtml, examples: examplesHtml, tocItems: tocItems };
    }

    // 渲染参考文献
    function renderReferences(refs) {
      if (!refs || refs.length === 0) return '';
      var html = '<div class="ci-references">';
      html += '<div class="ci-references-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> 参考文献</div>';
      html += '<div class="ci-ref-list">';
      refs.forEach(function(ref) {
        var badge = ref.type === 'paper' ? '<span class="ci-ref-badge paper">论文</span>' : '<span class="ci-ref-badge blog">博客</span>';
        html += '<div class="ci-ref-item">' + badge + ' ';
        if (ref.url) {
          html += '<span>' + ref.text + ' <a href="' + escapeHtml(ref.url) + '" target="_blank" rel="noopener">↗ 链接</a></span>';
        } else {
          html += '<span>' + ref.text + '</span>';
        }
        html += '</div>';
      });
      html += '</div></div>';
      return html;
    }

    // Python 简易语法高亮
    function highlightPython(code) {
      var escaped = escapeHtml(code);
      // 用占位符保护已处理的 span 标签，防止后续正则破坏 HTML 结构
      var spans = [];
      function protect(html) {
        return html.replace(/<span class="py-[^"]*">[\s\S]*?<\/span>/g, function(m) {
          spans.push(m);
          return '\x00SPAN' + (spans.length - 1) + '\x00';
        });
      }
      function restore(html) {
        return html.replace(/\x00SPAN(\d+)\x00/g, function(_, i) {
          return spans[i];
        });
      }
      // 先处理注释（# 开头到行尾）
      escaped = escaped.replace(/(#[^\n]*)/g, '<span class="py-comment">$1</span>');
      escaped = protect(escaped);
      // 字符串（三引号、单双引号）
      escaped = escaped.replace(/(&quot;&quot;&quot;[\s\S]*?&quot;&quot;&quot;|&#039;&#039;&#039;[\s\S]*?&#039;&#039;&#039;)/g, '<span class="py-str">$1</span>');
      escaped = escaped.replace(/(f?&quot;(?:[^&]|&(?!quot;))*?&quot;|f?&#039;(?:[^&]|&(?!#039;))*?&#039;)/g, '<span class="py-str">$1</span>');
      escaped = protect(escaped);
      // 关键字
      var kwList = ['import','from','as','def','class','return','if','elif','else','for','while','in','not','and','or','with','try','except','finally','raise','pass','break','continue','yield','lambda','True','False','None','async','await'];
      var kwPattern = new RegExp('\\b(' + kwList.join('|') + ')\\b', 'g');
      escaped = escaped.replace(kwPattern, function(m) {
        return '<span class="py-kw">' + m + '</span>';
      });
      escaped = protect(escaped);
      // 内置函数
      var builtins = ['print','len','range','enumerate','zip','map','filter','sorted','set','dict','list','tuple','int','float','str','bool','type','isinstance','getattr','setattr','super','open','round','abs','sum','min','max','any','all'];
      var builtinPattern = new RegExp('\\b(' + builtins.join('|') + ')\\s*\\(', 'g');
      escaped = escaped.replace(builtinPattern, function(m, fn) {
        return '<span class="py-builtin">' + fn + '</span>(';
      });
      escaped = protect(escaped);
      // 数字
      escaped = escaped.replace(/\b(\d+\.?\d*(?:e[+-]?\d+)?)\b/g, '<span class="py-num">$1</span>');
      // 还原所有占位符
      escaped = restore(escaped);
      return escaped;
    }

    // 异步检查参考文献链接可用性
    function checkReferenceLinks() {
      var links = document.querySelectorAll('.ci-ref-item a[href]');
      links.forEach(function(link) {
        var url = link.getAttribute('href');
        if (!url || url.startsWith('#') || url.startsWith('javascript:')) return;
        link.classList.add('link-checking');
        // 使用 HEAD 请求检查链接（带超时）
        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 8000);
        fetch(url, {
          method: 'HEAD',
          mode: 'no-cors',
          signal: controller.signal
        }).then(function(resp) {
          clearTimeout(timeoutId);
          link.classList.remove('link-checking');
          // no-cors 模式下 type 为 'opaque'，status 为 0，但说明可达
          if (resp.ok || resp.type === 'opaque') {
            link.classList.add('link-ok');
          } else if (resp.status >= 400) {
            link.classList.add('link-dead');
          } else {
            link.classList.add('link-ok');
          }
        }).catch(function(err) {
          clearTimeout(timeoutId);
          link.classList.remove('link-checking');
          // 网络错误或超时 → 标记为可能失效
          link.classList.add('link-dead');
        });
      });
    }

    (async function() {
      let data, modules;
      try {
        const resp = await fetch('../data/causal-inference.json?v=20260413e');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        data = await resp.json();
        modules = data.modules;
      } catch(e) {
        console.error('加载因果推断数据失败:', e);
        var el = document.getElementById('ciContent');
        if (el) el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#64748b;"><p><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>数据加载失败，请刷新页面重试</p><p style="font-size:13px;margin-top:8px;">错误信息: ' + e.message + '</p></div>';
        return;
      }

      // 收集所有要渲染的 section（仅 active 模块展开）
      // 同时为每个层级分配数字编号
      const activeSections = [];
      let moduleIdx = 0;
      modules.forEach(mod => {
        if (mod.status === 'active' && mod.sections.length > 0) {
          moduleIdx++;
          mod._num = String(moduleIdx); // 一级编号: 1, 2, 3...
          mod.sections.forEach((sec, si) => {
            sec._num = moduleIdx + '.' + (si + 1); // 二级编号: 1.1, 1.2...
            if (sec.operators) {
              sec.operators.forEach((op, oi) => {
                op._num = moduleIdx + '.' + (si + 1) + '.' + (oi + 1); // 三级编号: 1.1.1
              });
            }
            activeSections.push({ ...sec, moduleId: mod.id, _moduleNum: mod._num });
          });
        }
      });

      // 1. 渲染侧边栏
      const sidebarNav = document.getElementById('sidebarNav');
      let sidebarHtml = '';

      modules.forEach((mod, modIndex) => {
        if (mod.status === 'active') {
          // 一级标题：可点击跳转 + 折叠/展开，默认全部展开
          var firstSecId = mod.sections.length > 0 ? mod.sections[0].id : '';
          sidebarHtml += '<div class="sidebar-module-group expanded">' +
            '<div class="sidebar-module-title" data-module="' + mod.id + '" data-first-section="' + firstSecId + '">' +
              '<span class="sidebar-module-text">' + mod._num + ' ' + mod.title + '</span>' +
              '<svg class="sidebar-module-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
            '</div>' +
            '<div class="sidebar-module-children">';
          mod.sections.forEach((sec, i) => {
            const ops = sec.operators || [];
            sidebarHtml += '<div class="sidebar-section-group">';
            sidebarHtml += '<a class="sidebar-link' + (i === 0 ? ' active' : '') + '" data-section="' + sec.id + '">' +
              '<span>' + sec._num + ' ' + sec.title + '</span></a>';
            // 子项（始终展开）
            if (ops.length > 0) {
              sidebarHtml += '<div class="sidebar-sub-items">';
              ops.forEach(op => {
                sidebarHtml += '<a class="sidebar-sub-link" data-op="' + op.id + '">' + op._num + ' ' + op.name + '</a>';
              });
              sidebarHtml += '</div>';
            }
            sidebarHtml += '</div>';
          });
          sidebarHtml += '</div></div>'; // end sidebar-module-children + sidebar-module-group
        } else {
          sidebarHtml += '<div class="sidebar-coming">' +
            '<span>' + mod.title + '</span>' +
            '<span class="sidebar-badge-soon">即将上线</span></div>';
        }
      });
      sidebarNav.innerHTML = sidebarHtml;

      // 平滑滚动（带顶部导航栏 + sticky op-header 偏移量）
      function smoothScrollTo(el) {
        if (!el) return;
        var navbarH = 64;
        // 检查目标元素是否在 operator 卡片内部（非卡片本身），需额外偏移 sticky op-header
        var stickyH = 0;
        var opCard = el.closest('.ci-operator-card');
        if (opCard && el !== opCard) {
          var header = opCard.querySelector('.ci-op-header');
          if (header) stickyH = header.offsetHeight;
        }
        var rect = el.getBoundingClientRect();
        var scrollTop = window.scrollY || document.documentElement.scrollTop;
        var y = rect.top + scrollTop - navbarH - stickyH - 16;
        window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
      }

      // 一级标题点击：折叠/展开 + 跳转到第一个 section
      sidebarNav.querySelectorAll('.sidebar-module-title').forEach(title => {
        title.addEventListener('click', function(e) {
          e.preventDefault();
          var group = this.closest('.sidebar-module-group');
          if (group) group.classList.toggle('expanded');
          // 同时跳转到该模块的第一个 section
          var firstSecId = this.getAttribute('data-first-section');
          if (firstSecId) {
            smoothScrollTo(document.getElementById(firstSecId));
          }
        });
      });

      // 侧边栏点击跳转
      sidebarNav.querySelectorAll('.sidebar-link').forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          smoothScrollTo(document.getElementById(this.getAttribute('data-section')));
        });
      });

      // 2. 移动端目录
      const mobileTocList = document.getElementById('mobileTocList');
      if (mobileTocList) {
        let tocHtml = '';
        modules.forEach(mod => {
          if (mod.status === 'active') {
            mod.sections.forEach((sec, i) => {
              const opCount = sec.operators ? sec.operators.length : 0;
              const ops = sec.operators || [];
              tocHtml += '<div class="mobile-toc-section-group">';
              tocHtml += '<a class="mobile-toc-item' + (i === 0 ? ' active' : '') + '" data-section="' + sec.id + '">' +
                '<span class="mobile-toc-dot" style="background:' + mod.sidebarDot + ';"></span>' +
                '<span>' + sec._num + ' ' + sec.title + '</span>' +
                '<span class="mobile-toc-count">' + opCount + '</span>' +
                '<svg class="mobile-toc-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></a>';
              if (ops.length > 0) {
                tocHtml += '<div class="mobile-toc-sub-items">';
                ops.forEach(op => {
                  tocHtml += '<a class="mobile-toc-sub-link" data-op="' + op.id + '">' + op._num + ' ' + op.name + '</a>';
                });
                tocHtml += '</div>';
              }
              tocHtml += '</div>';
            });
          } else {
            tocHtml += '<div class="mobile-toc-coming">' + mod.icon + ' ' + mod.title + ' <span class="sidebar-badge-soon">即将上线</span></div>';
          }
        });
        mobileTocList.innerHTML = tocHtml;
        // 移动端 section 点击：展开/折叠子项 + 跳转
        mobileTocList.querySelectorAll('.mobile-toc-item').forEach(item => {
          item.addEventListener('click', function(e) {
            e.preventDefault();
            this.closest('.mobile-toc-section-group').classList.toggle('expanded');
            smoothScrollTo(document.getElementById(this.dataset.section));
            toggleMobileToc();
          });
        });
        // 移动端 sub-link 点击：跳转到 operator
        mobileTocList.querySelectorAll('.mobile-toc-sub-link').forEach(link => {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            smoothScrollTo(document.getElementById('op-' + this.dataset.op));
            toggleMobileToc();
          });
        });
      }

      // 3. 渲染内容
      const ciContent = document.getElementById('ciContent');
      let contentHtml = '';
      // 存储每个 operator 的内部文章结构目录
      const opTocMap = {};

      activeSections.forEach(sec => {
        contentHtml += '<div class="section-anchor" id="' + sec.id + '"></div>';
        contentHtml += '<div class="section-header">' +
          '<div><h3 class="section-title">' + sec._num + ' ' + sec.title + '</h3>' +
          '<p class="section-subtitle">' + sec.subtitle + '</p></div></div>';

        contentHtml += '<div class="ci-operator-list">';
        (sec.operators || []).forEach(op => {
          var codeId = 'code-' + op.id;
          // 初始化该 operator 的内部目录
          var opToc = [];

          contentHtml += '<div class="ci-operator-card" id="op-' + op.id + '">' +
            '<div class="ci-op-header">' +
              '<div class="ci-op-titles">' +
                '<h4 class="ci-op-name">' + op._num + ' ' + op.name + '</h4>' +
                '<span class="ci-op-name-en">' + op.nameEn + '</span>' +
              '</div>' +
              '<div class="ci-op-tags">' +
                op.tags.map(function(t) { return '<span class="paper-tag ' + t.color + '">' + t.text + '</span>'; }).join('') +
              '</div>' +
            '</div>';
          contentHtml += '<div class="ci-op-body">';

          // 正文区域：每个段落带可见标题
          // 1. 定义（带锚点和标题）
          var descAnchorId = op.id + '-desc';
          contentHtml += '<div class="ci-labeled-section ci-toc-anchor" id="' + descAnchorId + '">' +
            '<h5 class="ci-section-heading">定义</h5>' +
            '<p class="ci-body-text">' + op.desc + '</p>' +
          '</div>';
          opToc.push({ id: descAnchorId, title: '定义', type: 'desc' });

          // 2. 场景（带锚点和标题）
          var whenAnchorId = op.id + '-when';
          contentHtml += '<div class="ci-labeled-section ci-toc-anchor" id="' + whenAnchorId + '">' +
            '<h5 class="ci-section-heading">场景</h5>' +
            '<p class="ci-body-text">' + op.when + '</p>' +
          '</div>';
          opToc.push({ id: whenAnchorId, title: '场景', type: 'when' });

          // 解析 principle，分离原理与示例（传入 opId 用于生成锚点）
          var parsed = renderPrinciple(op.principle, op.id);

          // 3. 原理（核心内容区，带标题）
          if (parsed.principle) {
            var principleAnchorId = op.id + '-principle';
            contentHtml += '<div class="ci-labeled-section ci-toc-anchor" id="' + principleAnchorId + '">' +
              '<h5 class="ci-section-heading">原理</h5>' +
            '</div>';
            opToc.push({ id: principleAnchorId, title: '原理', type: 'desc' });
            contentHtml += '<div class="ci-principle">' + parsed.principle + '</div>';
            // 将 principle 内部的 tocItems 合并到 opToc
            opToc = opToc.concat(parsed.tocItems);
          }

          // 4. 示例（如果有，以高亮块形式呈现，带标题）
          if (parsed.examples) {
            var exAnchorId = op.id + '-examples';
            contentHtml += '<div class="ci-labeled-section ci-toc-anchor" id="' + exAnchorId + '">' +
              '<h5 class="ci-section-heading ci-sh-example">举例</h5>' +
              '<div class="ci-section-example">' + parsed.examples + '</div>' +
            '</div>';
            opToc.push({ id: exAnchorId, title: '举例', type: 'example' });
          }

          // 5. 延展（作为补充段落，带标题）
          if (op.vs) {
            var vsAnchorId = op.id + '-vs';
            contentHtml += '<div class="ci-labeled-section ci-toc-anchor" id="' + vsAnchorId + '">' +
              '<h5 class="ci-section-heading ci-sh-vs">延展</h5>' +
              '<p class="ci-body-text ci-body-vs">' + op.vs + '</p>' +
            '</div>';
            opToc.push({ id: vsAnchorId, title: '延展', type: 'vs' });
          }

          // 存储该 operator 的内部目录
          opTocMap[op.id] = opToc;

          contentHtml += '</div>';

          // === 底部折叠区：参考文献、Python 代码 ===
          contentHtml += '<div class="ci-collapse-group">';

          // 1. 参考文献（折叠式）
          if (op.references && op.references.length > 0) {
            contentHtml += '<details class="ci-collapse-item">' +
              '<summary class="ci-collapse-summary">' +
                '<span class="ci-collapse-label">' +
                  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' +
                  ' 参考文献' +
                '</span>' +
                '<svg class="ci-collapse-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
              '</summary>' +
              '<div class="ci-collapse-body">' +
                '<div class="ci-ref-list">';
            op.references.forEach(function(ref) {
              var badge = ref.type === 'paper' ? '<span class="ci-ref-badge paper">论文</span>' : '<span class="ci-ref-badge blog">博客</span>';
              contentHtml += '<div class="ci-ref-item">' + badge + ' ';
              if (ref.url) {
                contentHtml += '<span>' + ref.text + ' <a href="' + escapeHtml(ref.url) + '" target="_blank" rel="noopener">↗ 链接</a></span>';
              } else {
                contentHtml += '<span>' + ref.text + '</span>';
              }
              contentHtml += '</div>';
            });
            contentHtml += '</div></div></details>';
          }

          // 3. Python 示例代码（折叠式）
          if (op.python) {
            contentHtml += '<details class="ci-collapse-item" id="' + codeId + '">' +
              '<summary class="ci-collapse-summary">' +
                '<span class="ci-collapse-label">' +
                  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>' +
                  ' 示例代码（Python）' +
                '</span>' +
                '<svg class="ci-collapse-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
              '</summary>' +
              '<div class="ci-collapse-body"><pre><code>' + highlightPython(op.python) + '</code></pre></div>' +
            '</details>';
          }

          contentHtml += '</div>'; // end ci-collapse-group

          contentHtml += '</div>';
        });
        contentHtml += '</div>';
      });

      ciContent.innerHTML = contentHtml;

      // 4. 渲染 KaTeX 公式
      document.querySelectorAll('.ci-formula-expr').forEach(function(el) {
        var latex = el.getAttribute('data-latex');
        if (latex && window.katex) {
          try {
            katex.render(latex, el, { displayMode: true, throwOnError: false });
          } catch(e) {
            el.textContent = latex;
          }
        } else if (latex) {
          // KaTeX 尚未加载，等待加载后渲染
          el.textContent = latex;
        }
      });

      // 如果 KaTeX 是 defer 加载的，等 load 后再渲染一次
      if (!window.katex) {
        window.addEventListener('load', function() {
          document.querySelectorAll('.ci-formula-expr').forEach(function(el) {
            var latex = el.getAttribute('data-latex');
            if (latex && window.katex) {
              try {
                el.textContent = '';
                katex.render(latex, el, { displayMode: true, throwOnError: false });
              } catch(e) {
                el.textContent = latex;
              }
            }
          });
        });
      }

      // 5. 右侧目录（本页目录 / TOC）—— 显示当前 operator 的文章内部结构
      const tocNav = document.getElementById('ciTocNav');
      let currentTocOp = ''; // 追踪当前 TOC 对应的 operator

      // TOC 不再使用图标，纯文字目录

      function updateTocForOperator(opId) {
        if (!tocNav || !opId) return;
        // 如果 operator 没变，不需要重建 DOM
        if (currentTocOp === opId) return;
        currentTocOp = opId;

        var tocItems = opTocMap[opId];
        if (!tocItems || tocItems.length === 0) {
          tocNav.innerHTML = '<span class="ci-toc-empty">暂无目录结构</span>';
          return;
        }

        // 渲染该 operator 内部的文章结构目录
        var html = '';
        tocItems.forEach(function(item) {
          var cssClass = 'ci-toc-item ci-toc-type-' + item.type;
          html += '<a class="' + cssClass + '" data-anchor="' + item.id + '"><span class="ci-toc-text">' + item.title + '</span></a>';
        });
        tocNav.innerHTML = html;

        // 绑定点击事件
        tocNav.querySelectorAll('.ci-toc-item').forEach(function(a) {
          a.addEventListener('click', function(e) {
            e.preventDefault();
            var target = document.getElementById(this.dataset.anchor);
            if (target) smoothScrollTo(target);
          });
        });
      }

      // 初始化：显示第一个 operator 的内部目录
      var firstOpId = Object.keys(opTocMap)[0];
      if (firstOpId) {
        updateTocForOperator(firstOpId);
      }

      // 6. 侧边目录高亮跟踪
      const sidebarLinks = document.querySelectorAll('.sidebar-link');
      const sidebarSubLinks = document.querySelectorAll('.sidebar-sub-link');
      const sectionEls = document.querySelectorAll('.section-anchor');
      const opEls = document.querySelectorAll('.ci-operator-card');

      // 7. 异步检查参考文献链接
      setTimeout(checkReferenceLinks, 1500);

      function updateActiveLink() {
        let currentSection = '';
        let currentOp = '';
        sectionEls.forEach(function(section) {
          if (section.getBoundingClientRect().top <= 160) currentSection = section.id;
        });
        opEls.forEach(function(card) {
          if (card.getBoundingClientRect().top <= 200) currentOp = card.id.replace('op-', '');
        });
        sidebarLinks.forEach(function(link) {
          link.classList.remove('active');
          if (link.getAttribute('data-section') === currentSection) link.classList.add('active');
        });
        sidebarSubLinks.forEach(function(link) {
          link.classList.toggle('active', link.dataset.op === currentOp);
        });
        document.querySelectorAll('.mobile-toc-item').forEach(function(item) {
          item.classList.toggle('active', item.dataset.section === currentSection);
        });
        document.querySelectorAll('.mobile-toc-sub-link').forEach(function(link) {
          link.classList.toggle('active', link.dataset.op === currentOp);
        });
        // Right TOC: update to show current operator's internal structure
        updateTocForOperator(currentOp);
        // Highlight current visible anchor in right TOC
        if (currentOp && opTocMap[currentOp]) {
          var currentAnchor = '';
          opTocMap[currentOp].forEach(function(item) {
            var el = document.getElementById(item.id);
            if (el && el.getBoundingClientRect().top <= 220) {
              currentAnchor = item.id;
            }
          });
          document.querySelectorAll('#ciTocNav .ci-toc-item').forEach(function(a) {
            a.classList.toggle('active', a.dataset.anchor === currentAnchor);
          });
        }
      }

      window.addEventListener('scroll', updateActiveLink);
      updateActiveLink();

      // 6. 点击 operator 子项平滑滚动
      sidebarSubLinks.forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          smoothScrollTo(document.getElementById('op-' + this.dataset.op));
        });
      });
    })();

    function toggleMobileToc() {
      document.getElementById('mobileTocOverlay').classList.toggle('active');
      document.getElementById('mobileTocPanel').classList.toggle('active');
    }
  </script>

  <!-- 返回顶部按钮 -->
  <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="返回顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <script>
  (function(){var btn=document.getElementById('backToTop');if(!btn)return;window.addEventListener('scroll',function(){btn.classList.toggle('visible',window.scrollY>400)},{passive:true});})();
  </script>

  <script src="../js/search.js"></script>
  <script src="../js/assistant.js"></script>

</body>
</html>
