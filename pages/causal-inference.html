  <script>
    // ============================================================
    // 因果推断工具箱：原理 + 可折叠 Python 代码
    // ============================================================
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // 渲染原理 section 的 HTML（连续公式自动并排）
    // 返回 { principle: '...', examples: '...' } 分离原理与示例
    function renderPrinciple(principle) {
      if (!principle || !principle.sections) return { principle: '', examples: '' };
      var principleHtml = '';
      var examplesHtml = '';
      var items = principle.sections;
      var i = 0;
      while (i < items.length) {
        var s = items[i];
        if (s.type === 'text') {
          if (s.content.indexOf('💡') === 0) {
            // 示例文字不再单独区块，跳过（后面在公式解读中处理）
            examplesHtml += '<p class="ci-principle-text">' + s.content.replace(/^💡\s*举例[：:]\s*/, '') + '</p>';
          } else {
            principleHtml += '<p class="ci-principle-text">' + s.content + '</p>';
          }
          i++;
        } else if (s.type === 'formula') {
          // 收集连续的 formula
          var formulas = [];
          while (i < items.length && items[i].type === 'formula') {
            formulas.push(items[i]);
            i++;
          }
          var colsClass = formulas.length === 1 ? ' cols-1' : (formulas.length >= 3 ? ' cols-3' : '');
          if (formulas.length > 3) colsClass = '';
          principleHtml += '<div class="ci-formula-grid' + colsClass + '">';
          formulas.forEach(function(f, idx) {
            principleHtml += '<div class="ci-formula-block">' +
              '<span class="ci-formula-label">' + f.label + '</span>' +
              '<div class="ci-formula-expr" data-latex="' + escapeHtml(f.latex) + '"></div>';
            if (f.vars && f.vars.length > 0) {
              principleHtml += '<div class="ci-formula-vars">';
              f.vars.forEach(function(v) {
                principleHtml += '<div><code>' + escapeHtml(v.symbol) + '</code> — ' + v.desc + '</div>';
              });
              principleHtml += '</div>';
            }
            principleHtml += '</div>';
          });
          // 公式组后紧跟的 text（解读 + 示例）都收进公式区
          var noteContent = '';
          // 先收解读文字
          if (i < items.length && items[i].type === 'text' && items[i].content.indexOf('💡') !== 0) {
            noteContent += items[i].content;
            i++;
          }
          // 再收紧跟的示例，融为一段
          if (i < items.length && items[i].type === 'text' && items[i].content.indexOf('💡') === 0) {
            var exText = items[i].content.replace(/^💡\s*举例[：:]\s*/, '');
            noteContent += (noteContent ? '<br><span class="ci-note-example">💡 ' + exText + '</span>' : '<span class="ci-note-example">💡 ' + exText + '</span>');
            i++;
          }
          if (noteContent) {
            principleHtml += '<p class="ci-formula-note">' + noteContent + '</p>';
          }
          principleHtml += '</div>';
        } else if (s.type === 'keypoint') {
          principleHtml += '<div class="ci-keypoint">' +
            '<div class="ci-keypoint-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg> ' + s.title + '</div>' +
            '<p class="ci-keypoint-content">' + s.content + '</p>' +
          '</div>';
          i++;
        } else {
          i++;
        }
      }
      return { principle: principleHtml, examples: examplesHtml };
    }

    // 渲染参考文献
    function renderReferences(refs) {
      if (!refs || refs.length === 0) return '';
      var html = '<div class="ci-references">';
      html += '<div class="ci-references-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> 参考文献</div>';
      html += '<div class="ci-ref-list">';
      refs.forEach(function(ref) {
        var badge = ref.type === 'paper' ? '<span class="ci-ref-badge paper">论文</span>' : '<span class="ci-ref-badge blog">博客</span>';
        html += '<div class="ci-ref-item">' + badge + ' ';
        if (ref.url) {
          html += '<span>' + ref.text + ' <a href="' + escapeHtml(ref.url) + '" target="_blank" rel="noopener">↗ 链接</a></span>';
        } else {
          html += '<span>' + ref.text + '</span>';
        }
        html += '</div>';
      });
      html += '</div></div>';
      return html;
    }

    // Python 简易语法高亮
    function highlightPython(code) {
      var escaped = escapeHtml(code);
      // 用占位符保护已处理的 span 标签，防止后续正则破坏 HTML 结构
      var spans = [];
      function protect(html) {
        return html.replace(/<span class="py-[^"]*">[\s\S]*?<\/span>/g, function(m) {
          spans.push(m);
          return '\x00SPAN' + (spans.length - 1) + '\x00';
        });
      }
      function restore(html) {
        return html.replace(/\x00SPAN(\d+)\x00/g, function(_, i) {
          return spans[i];
        });
      }
      // 先处理注释（# 开头到行尾）
      escaped = escaped.replace(/(#[^\n]*)/g, '<span class="py-comment">$1</span>');
      escaped = protect(escaped);
      // 字符串（三引号、单双引号）
      escaped = escaped.replace(/(&quot;&quot;&quot;[\s\S]*?&quot;&quot;&quot;|&#039;&#039;&#039;[\s\S]*?&#039;&#039;&#039;)/g, '<span class="py-str">$1</span>');
      escaped = escaped.replace(/(f?&quot;(?:[^&]|&(?!quot;))*?&quot;|f?&#039;(?:[^&]|&(?!#039;))*?&#039;)/g, '<span class="py-str">$1</span>');
      escaped = protect(escaped);
      // 关键字
      var kwList = ['import','from','as','def','class','return','if','elif','else','for','while','in','not','and','or','with','try','except','finally','raise','pass','break','continue','yield','lambda','True','False','None','async','await'];
      var kwPattern = new RegExp('\\b(' + kwList.join('|') + ')\\b', 'g');
      escaped = escaped.replace(kwPattern, function(m) {
        return '<span class="py-kw">' + m + '</span>';
      });
      escaped = protect(escaped);
      // 内置函数
      var builtins = ['print','len','range','enumerate','zip','map','filter','sorted','set','dict','list','tuple','int','float','str','bool','type','isinstance','getattr','setattr','super','open','round','abs','sum','min','max','any','all'];
      var builtinPattern = new RegExp('\\b(' + builtins.join('|') + ')\\s*\\(', 'g');
      escaped = escaped.replace(builtinPattern, function(m, fn) {
        return '<span class="py-builtin">' + fn + '</span>(';
      });
      escaped = protect(escaped);
      // 数字
      escaped = escaped.replace(/\b(\d+\.?\d*(?:e[+-]?\d+)?)\b/g, '<span class="py-num">$1</span>');
      // 还原所有占位符
      escaped = restore(escaped);
      return escaped;
    }

    // 异步检查参考文献链接可用性
    function checkReferenceLinks() {
      var links = document.querySelectorAll('.ci-ref-item a[href]');
      links.forEach(function(link) {
        var url = link.getAttribute('href');
        if (!url || url.startsWith('#') || url.startsWith('javascript:')) return;
        link.classList.add('link-checking');
        // 使用 HEAD 请求检查链接（带超时）
        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 8000);
        fetch(url, {
          method: 'HEAD',
          mode: 'no-cors',
          signal: controller.signal
        }).then(function(resp) {
          clearTimeout(timeoutId);
          link.classList.remove('link-checking');
          // no-cors 模式下 type 为 'opaque'，status 为 0，但说明可达
          if (resp.ok || resp.type === 'opaque') {
            link.classList.add('link-ok');
          } else if (resp.status >= 400) {
            link.classList.add('link-dead');
          } else {
            link.classList.add('link-ok');
          }
        }).catch(function(err) {
          clearTimeout(timeoutId);
          link.classList.remove('link-checking');
          // 网络错误或超时 → 标记为可能失效
          link.classList.add('link-dead');
        });
      });
    }

    (async function() {
      let data, modules;
      try {
        const resp = await fetch('../data/causal-inference.json?v=20260410k');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        data = await resp.json();
        modules = data.modules;
      } catch(e) {
        console.error('加载因果推断数据失败:', e);
        var el = document.getElementById('ciContent');
        if (el) el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#64748b;"><p><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>数据加载失败，请刷新页面重试</p><p style="font-size:13px;margin-top:8px;">错误信息: ' + e.message + '</p></div>';
        return;
      }

      // 收集所有要渲染的 section（仅 active 模块展开）
      const activeSections = [];
      modules.forEach(mod => {
        if (mod.status === 'active' && mod.sections.length > 0) {
          mod.sections.forEach(sec => activeSections.push({ ...sec, moduleId: mod.id }));
        }
      });

      // 1. 渲染侧边栏
      const sidebarNav = document.getElementById('sidebarNav');
      let sidebarHtml = '';

      modules.forEach(mod => {
        if (mod.status === 'active') {
          sidebarHtml += '<div class="sidebar-module-title">' + mod.title + '</div>';
          mod.sections.forEach((sec, i) => {
            const opCount = sec.operators ? sec.operators.length : 0;
            const ops = sec.operators || [];
            sidebarHtml += '<div class="sidebar-section-group">';
            sidebarHtml += '<a class="sidebar-link' + (i === 0 ? ' active' : '') + '" data-section="' + sec.id + '">' +
              '<span class="sidebar-dot" style="background:' + mod.sidebarDot + ';"></span>' +
              '<span>' + sec.title + '</span>' +
              '<span class="sidebar-count">' + opCount + '</span>' +
              '<svg class="sidebar-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></a>';
            // Level 3: operator 子项（默认折叠）
            if (ops.length > 0) {
              sidebarHtml += '<div class="sidebar-sub-items">';
              ops.forEach(op => {
                sidebarHtml += '<a class="sidebar-sub-link" data-op="' + op.id + '">' + op.name + '</a>';
              });
              sidebarHtml += '</div>';
            }
            sidebarHtml += '</div>';
          });
        } else {
          sidebarHtml += '<div class="sidebar-coming">' +
            '<span class="sidebar-dot" style="background:' + mod.sidebarDot + ';opacity:0.4;"></span>' +
            '<span>' + mod.title + '</span>' +
            '<span class="sidebar-badge-soon">即将上线</span></div>';
        }
      });
      sidebarNav.innerHTML = sidebarHtml;

      // 平滑滚动（带顶部导航栏 + sticky section-header 偏移量）
      function smoothScrollTo(el) {
        if (!el) return;
        var navbarH = 64;
        // 检查目标元素是否是 operator 卡片（非 section-anchor），需额外偏移 sticky header
        var stickyH = 0;
        if (el.classList.contains('ci-operator-card')) {
          // 找到该卡片所属 section 的 sticky header
          var prev = el.previousElementSibling;
          var parent = el.closest('.ci-operator-list');
          if (parent) {
            var header = parent.previousElementSibling;
            while (header && !header.classList.contains('section-header')) {
              header = header.previousElementSibling;
            }
            if (header) stickyH = header.offsetHeight;
          }
        }
        var rect = el.getBoundingClientRect();
        var scrollTop = window.scrollY || document.documentElement.scrollTop;
        var y = rect.top + scrollTop - navbarH - stickyH - 16;
        window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
      }

      // 侧边栏折叠/展开逻辑：点击整个 sidebar-link 即可展开/折叠
      sidebarNav.querySelectorAll('.sidebar-link').forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const group = this.closest('.sidebar-section-group');
          group.classList.toggle('expanded');
          // 同时跳转到对应 section
          smoothScrollTo(document.getElementById(this.getAttribute('data-section')));
        });
      });

      // 一键全部展开/折叠
      const expandAllBtn = document.getElementById('sidebarExpandAll');
      let allExpanded = false;
      expandAllBtn.addEventListener('click', function() {
        allExpanded = !allExpanded;
        sidebarNav.querySelectorAll('.sidebar-section-group').forEach(g => {
          if (allExpanded) {
            g.classList.add('expanded');
          } else {
            g.classList.remove('expanded');
          }
        });
        this.classList.toggle('active', allExpanded);
        this.title = allExpanded ? '全部折叠' : '全部展开';
      });

      // 2. 移动端目录
      const mobileTocList = document.getElementById('mobileTocList');
      if (mobileTocList) {
        let tocHtml = '';
        modules.forEach(mod => {
          if (mod.status === 'active') {
            mod.sections.forEach((sec, i) => {
              const opCount = sec.operators ? sec.operators.length : 0;
              const ops = sec.operators || [];
              tocHtml += '<div class="mobile-toc-section-group">';
              tocHtml += '<a class="mobile-toc-item' + (i === 0 ? ' active' : '') + '" data-section="' + sec.id + '">' +
                '<span class="mobile-toc-dot" style="background:' + mod.sidebarDot + ';"></span>' +
                '<span>' + sec.title + '</span>' +
                '<span class="mobile-toc-count">' + opCount + '</span>' +
                '<svg class="mobile-toc-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></a>';
              if (ops.length > 0) {
                tocHtml += '<div class="mobile-toc-sub-items">';
                ops.forEach(op => {
                  tocHtml += '<a class="mobile-toc-sub-link" data-op="' + op.id + '">' + op.name + '</a>';
                });
                tocHtml += '</div>';
              }
              tocHtml += '</div>';
            });
          } else {
            tocHtml += '<div class="mobile-toc-coming">' + mod.icon + ' ' + mod.title + ' <span class="sidebar-badge-soon">即将上线</span></div>';
          }
        });
        mobileTocList.innerHTML = tocHtml;
        // 移动端 section 点击：展开/折叠子项 + 跳转
        mobileTocList.querySelectorAll('.mobile-toc-item').forEach(item => {
          item.addEventListener('click', function(e) {
            e.preventDefault();
            this.closest('.mobile-toc-section-group').classList.toggle('expanded');
            smoothScrollTo(document.getElementById(this.dataset.section));
            toggleMobileToc();
          });
        });
        // 移动端 sub-link 点击：跳转到 operator
        mobileTocList.querySelectorAll('.mobile-toc-sub-link').forEach(link => {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            smoothScrollTo(document.getElementById('op-' + this.dataset.op));
            toggleMobileToc();
          });
        });
      }

      // 3. 渲染内容
      const ciContent = document.getElementById('ciContent');
      let contentHtml = '';

      activeSections.forEach(sec => {
        contentHtml += '<div class="section-anchor" id="' + sec.id + '"></div>';
        contentHtml += '<div class="section-header">' +
          '<div class="section-icon" style="background:' + sec.gradient + ';">' + sec.icon + '</div>' +
          '<div><h3 class="section-title">' + sec.title + '</h3>' +
          '<p class="section-subtitle">' + sec.subtitle + '</p></div></div>';

        contentHtml += '<div class="ci-operator-list">';
        (sec.operators || []).forEach(op => {
          var codeId = 'code-' + op.id;
          contentHtml += '<div class="ci-operator-card" id="op-' + op.id + '">' +
            '<div class="ci-op-header">' +
              '<div class="ci-op-titles">' +
                '<h4 class="ci-op-name">' + op.name + '</h4>' +
                '<span class="ci-op-name-en">' + op.nameEn + '</span>' +
              '</div>' +
              '<div class="ci-op-tags">' +
                op.tags.map(function(t) { return '<span class="paper-tag ' + t.color + '">' + t.text + '</span>'; }).join('') +
              '</div>' +
            '</div>';
          contentHtml += '<div class="ci-op-body">';

          // 1. 定义
          contentHtml += '<div class="ci-section-block">' +
            '<span class="ci-section-label">定义</span>' +
            '<p class="ci-section-text">' + op.desc + '</p>' +
          '</div>';

          // 2. 场景
          contentHtml += '<div class="ci-section-block">' +
            '<span class="ci-section-label">场景</span>' +
            '<p class="ci-section-text">' + op.when + '</p>' +
          '</div>';

          // 解析 principle，分离原理与示例
          var parsed = renderPrinciple(op.principle);

          // 3. 原理
          if (parsed.principle) {
            contentHtml += '<div class="ci-section-block">' +
              '<span class="ci-section-label">原理</span>' +
              '<div class="ci-principle">' + parsed.principle + '</div>' +
            '</div>';
          }

          // 4. 示例
          if (parsed.examples) {
            contentHtml += '<div class="ci-section-block">' +
              '<span class="ci-section-label">示例</span>' +
              '<div class="ci-section-example">' + parsed.examples + '</div>' +
            '</div>';
          }

          // 5. 延展
          if (op.vs) {
            contentHtml += '<div class="ci-section-block">' +
              '<span class="ci-section-label">延展</span>' +
              '<p class="ci-section-text">' + op.vs + '</p>' +
            '</div>';
          }

          contentHtml += '</div>';

          // === 底部折叠区：优劣势、参考文献、Python 代码 ===
          contentHtml += '<div class="ci-collapse-group">';

          // 1. 优势劣势
          if (op.pros || op.cons) {
            contentHtml += '<details class="ci-collapse-item">' +
              '<summary class="ci-collapse-summary">' +
                '<span class="ci-collapse-label">' +
                  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>' +
                  ' 优势劣势' +
                '</span>' +
                '<svg class="ci-collapse-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
              '</summary>' +
              '<div class="ci-collapse-body">';
            contentHtml += '<div class="ci-proscons">';
            if (op.pros) {
              contentHtml += '<div class="ci-proscons-col ci-pros">' +
                '<div class="ci-proscons-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> 优势</div>' +
                '<ul>' + op.pros.map(function(p) { return '<li>' + p + '</li>'; }).join('') + '</ul></div>';
            }
            if (op.cons) {
              contentHtml += '<div class="ci-proscons-col ci-cons">' +
                '<div class="ci-proscons-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> 劣势</div>' +
                '<ul>' + op.cons.map(function(c) { return '<li>' + c + '</li>'; }).join('') + '</ul></div>';
            }
            contentHtml += '</div>';
            contentHtml += '</div></details>';
          }

          // 2. 参考文献（折叠式）
          if (op.references && op.references.length > 0) {
            contentHtml += '<details class="ci-collapse-item">' +
              '<summary class="ci-collapse-summary">' +
                '<span class="ci-collapse-label">' +
                  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' +
                  ' 参考文献' +
                '</span>' +
                '<svg class="ci-collapse-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
              '</summary>' +
              '<div class="ci-collapse-body">' +
                '<div class="ci-ref-list">';
            op.references.forEach(function(ref) {
              var badge = ref.type === 'paper' ? '<span class="ci-ref-badge paper">论文</span>' : '<span class="ci-ref-badge blog">博客</span>';
              contentHtml += '<div class="ci-ref-item">' + badge + ' ';
              if (ref.url) {
                contentHtml += '<span>' + ref.text + ' <a href="' + escapeHtml(ref.url) + '" target="_blank" rel="noopener">↗ 链接</a></span>';
              } else {
                contentHtml += '<span>' + ref.text + '</span>';
              }
              contentHtml += '</div>';
            });
            contentHtml += '</div></div></details>';
          }

          // 3. Python 示例代码（折叠式）
          if (op.python) {
            contentHtml += '<details class="ci-collapse-item" id="' + codeId + '">' +
              '<summary class="ci-collapse-summary">' +
                '<span class="ci-collapse-label">' +
                  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>' +
                  ' 示例代码（Python）' +
                '</span>' +
                '<svg class="ci-collapse-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
              '</summary>' +
              '<div class="ci-collapse-body"><pre><code>' + highlightPython(op.python) + '</code></pre></div>' +
            '</details>';
          }

          contentHtml += '</div>'; // end ci-collapse-group

          contentHtml += '</div>';
        });
        contentHtml += '</div>';
      });

      ciContent.innerHTML = contentHtml;

      // 4. 渲染 KaTeX 公式
      document.querySelectorAll('.ci-formula-expr').forEach(function(el) {
        var latex = el.getAttribute('data-latex');
        if (latex && window.katex) {
          try {
            katex.render(latex, el, { displayMode: true, throwOnError: false });
          } catch(e) {
            el.textContent = latex;
          }
        } else if (latex) {
          // KaTeX 尚未加载，等待加载后渲染
          el.textContent = latex;
        }
      });

      // 如果 KaTeX 是 defer 加载的，等 load 后再渲染一次
      if (!window.katex) {
        window.addEventListener('load', function() {
          document.querySelectorAll('.ci-formula-expr').forEach(function(el) {
            var latex = el.getAttribute('data-latex');
            if (latex && window.katex) {
              try {
                el.textContent = '';
                katex.render(latex, el, { displayMode: true, throwOnError: false });
              } catch(e) {
                el.textContent = latex;
              }
            }
          });
        });
      }

      // 5. 侧边目录高亮跟踪
      const sidebarLinks = document.querySelectorAll('.sidebar-link');
      const sidebarSubLinks = document.querySelectorAll('.sidebar-sub-link');
      const sectionEls = document.querySelectorAll('.section-anchor');
      const opEls = document.querySelectorAll('.ci-operator-card');

      // 6. 异步检查参考文献链接
      setTimeout(checkReferenceLinks, 1500);

      function updateActiveLink() {
        let currentSection = '';
        let currentOp = '';
        sectionEls.forEach(function(section) {
          if (section.getBoundingClientRect().top <= 160) currentSection = section.id;
        });
        opEls.forEach(function(card) {
          if (card.getBoundingClientRect().top <= 200) currentOp = card.id.replace('op-', '');
        });
        sidebarLinks.forEach(function(link) {
          link.classList.remove('active');
          if (link.getAttribute('data-section') === currentSection) link.classList.add('active');
        });
        sidebarSubLinks.forEach(function(link) {
          link.classList.toggle('active', link.dataset.op === currentOp);
        });
        document.querySelectorAll('.mobile-toc-item').forEach(function(item) {
          item.classList.toggle('active', item.dataset.section === currentSection);
        });
        document.querySelectorAll('.mobile-toc-sub-link').forEach(function(link) {
          link.classList.toggle('active', link.dataset.op === currentOp);
        });
      }

      window.addEventListener('scroll', updateActiveLink);
      updateActiveLink();

      // 6. 点击 operator 子项平滑滚动
      sidebarSubLinks.forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          smoothScrollTo(document.getElementById('op-' + this.dataset.op));
        });
      });
    })();

    function toggleMobileToc() {
      document.getElementById('mobileTocOverlay').classList.toggle('active');
      document.getElementById('mobileTocPanel').classList.toggle('active');
    }
  </script>

  <!-- 返回顶部按钮 -->
  <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="返回顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <script>
  (function(){var btn=document.getElementById('backToTop');if(!btn)return;window.addEventListener('scroll',function(){btn.classList.toggle('visible',window.scrollY>400)},{passive:true});})();
  </script>

  <script src="../js/search.js"></script>
  <script src="../js/assistant.js"></script>

</body>
</html>
