          { name: 'PyMC', tagline: '贝叶斯概率编程框架', icon: '🎲', iconBg: 'linear-gradient(135deg, #8b5cf6, #6366f1)', stars: '8.7k', desc: '业界领先的贝叶斯统计建模和概率编程库。支持 NUTS 采样器、变分推断、高斯过程等。基于 PyTensor 后端，支持 GPU 加速和自动微分。', reason: '在做因果推断和 AB 实验分析时，贝叶斯方法能给出更直观的"A 比 B 好的概率是多少"的结论，比频率派 p 值更容易向业务方解释。', tags: [{text:'贝叶斯',color:'purple'},{text:'概率编程',color:'blue'},{text:'MCMC',color:'orange'}], install: 'pip install pymc', license: 'Apache 2.0', url: 'https://www.pymc.io', linkText: '官网 →' },
          { name: 'PyEcharts', tagline: 'Apache ECharts 的 Python 封装', icon: '📈', iconBg: 'linear-gradient(135deg, #ef4444, #dc2626)', stars: '14.8k', desc: '将 Apache ECharts 的强大可视化能力引入 Python 生态，支持 30+ 种图表类型。在 Jupyter Notebook 和 Web 应用中均可使用，国内互联网公司广泛采用。', reason: '如果你的报告是给国内团队看的，PyEcharts 生成的交互式图表比 Matplotlib 酷炫太多了，而且领导特别喜欢那种仪表盘风格的可视化。', tags: [{text:'可视化',color:'red'},{text:'ECharts',color:'blue'},{text:'交互式',color:'orange'}], install: 'pip install pyecharts', license: 'MIT License', url: 'https://pyecharts.org', linkText: '官网 →' },
        ]
      }
    };

    // ============================================================
    // 工具函数
    // ============================================================
    const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

    function formatDateCN(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日 · ${WEEKDAYS[d.getDay()]}`;
    }

    function getAvailableDates() {
      return Object.keys(dailyData).sort((a,b) => b.localeCompare(a));
    }

    // ============================================================
    // 渲染内容
    // ============================================================
    function renderContent(dateKey) {
      const data = dailyData[dateKey];
      const container = document.getElementById('dailyContent');

      if (!data) {
        container.innerHTML = `
          <div class="daily-empty">
            <span class="daily-empty-icon">📭</span>
            <h3>该日暂无资讯</h3>
            <p>当天没有合适的推荐内容，请查看其他日期。</p>
          </div>`;
        updateSidebarCounts(0, 0, 0);
        return;
      }

      let html = '';

      // 1. 科技资讯
      if (data.news && data.news.length > 0) {
        html += `
        <section class="daily-section" id="tech-news">
          <div class="section-header">
            <div class="section-icon" style="background: linear-gradient(135deg, #ef4444, #f97316);">🔥</div>
            <div>
              <h2 class="section-title">科技资讯</h2>
              <p class="section-subtitle">Tech News — 今天数据科学与 AI 领域的重要动态</p>
            </div>
          </div>
          <div class="news-list">`;

        data.news.forEach(n => {
          const hotClass = n.hot ? ' news-hot' : '';
          const badge = n.hot ? '<div class="news-badge hot">HOT</div>' : (n.isNew ? '<div class="news-badge new">NEW</div>' : '');
          html += `
            <a href="${n.url}" target="_blank" class="news-card${hotClass}">
              ${badge}
              <div class="news-body">
                <h3 class="news-title">${n.title}</h3>
                <p class="news-summary">${n.summary}</p>
                <div class="news-meta">
                  <span class="news-source">来源：${n.source}</span>
                  <span class="news-time">${n.time}</span>
                  <span class="news-tag ${n.tagColor}">${n.tag}</span>
                </div>
              </div>
              <span class="news-link-arrow">查看原文 →</span>
            </a>`;
        });
        html += '</div></section>';
      }

      // 2. 论文精选
      if (data.papers && data.papers.length > 0) {
        html += `
        <section class="daily-section" id="daily-papers">
          <div class="section-header">
            <div class="section-icon" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">📑</div>
            <div>
              <h2 class="section-title">论文精选</h2>
              <p class="section-subtitle">Daily Papers — 今天值得一读的数据科学论文</p>
            </div>
          </div>
          <div class="papers-daily-list">`;

        data.papers.forEach(p => {
          const tagsHtml = p.tags.map(t => `<span class="paper-daily-tag ${t.color}">${t.text}</span>`).join('');
          html += `
            <a href="${p.url}" target="_blank" class="paper-daily-card">
              <div class="paper-daily-rank">#${p.rank}</div>
              <div class="paper-daily-body">
                <div class="paper-daily-header">
                  <h3 class="paper-daily-title">${p.title}</h3>
                  <span class="paper-daily-venue">${p.venue}</span>
                </div>
                <p class="paper-daily-authors">${p.authors}</p>
                <p class="paper-daily-abstract">${p.abstract}</p>
                <div class="paper-daily-tags">${tagsHtml}</div>
                <div class="paper-daily-footer">
                  <span class="paper-daily-stat">📎 引用 ${p.citations}</span>
                  <span class="paper-daily-stat">${p.trending}</span>
                  <span class="paper-daily-link">阅读论文 →</span>
                </div>
              </div>
            </a>`;
        });
        html += '</div></section>';
      }

      // 3. 工具推荐
      if (data.tools && data.tools.length > 0) {
        html += `
        <section class="daily-section" id="daily-tools">
          <div class="section-header">
            <div class="section-icon" style="background: linear-gradient(135deg, #f97316, #fb923c);">🛠️</div>
            <div>
              <h2 class="section-title">工具推荐</h2>
              <p class="section-subtitle">Daily Tools — 今天发现的实用数据科学工具</p>
            </div>
          </div>
          <div class="tools-daily-grid">`;

        data.tools.forEach(t => {
          const tagsHtml = t.tags.map(tg => `<span class="tool-daily-tag ${tg.color}">${tg.text}</span>`).join('');
          html += `
            <a href="${t.url}" target="_blank" class="tool-daily-card">
              <div class="tool-daily-header">
                <div class="tool-daily-icon" style="background: ${t.iconBg};">${t.icon}</div>
                <div>
                  <h3 class="tool-daily-name">${t.name}</h3>
                  <span class="tool-daily-tagline">${t.tagline}</span>
                </div>
                <div class="tool-daily-stars">⭐ ${t.stars}</div>
              </div>
              <p class="tool-daily-desc">${t.desc}</p>
              <div class="tool-daily-highlight">
                <div class="tool-daily-highlight-title">💡 Henry 推荐理由</div>
                <p>${t.reason}</p>
              </div>
              <div class="tool-daily-tags">${tagsHtml}</div>
              <div class="tool-daily-footer">
                <div class="tool-daily-stats">
                  <span class="tool-daily-stat">📦 ${t.install}</span>
                  <span class="tool-daily-stat">📋 ${t.license}</span>
                </div>
                <span class="tool-daily-link">${t.linkText}</span>
              </div>
            </a>`;
        });
        html += '</div></section>';
      }

      container.innerHTML = html;
      updateSidebarCounts(
        data.news ? data.news.length : 0,
        data.papers ? data.papers.length : 0,
        data.tools ? data.tools.length : 0
      );

      // 重新绑定观察器
      initObserver();
    }

    function updateSidebarCounts(news, papers, tools) {
      document.getElementById('sidebarNewsCount').textContent = news;
      document.getElementById('sidebarPapersCount').textContent = papers;
      document.getElementById('sidebarToolsCount').textContent = tools;
    }

    // ============================================================
    // 往期资讯
    // ============================================================
    function renderArchive(currentKey) {
      const dates = getAvailableDates().filter(d => d !== currentKey);
      const grid = document.getElementById('archiveGrid');
      grid.innerHTML = dates.map(d => {
        const data = dailyData[d];
        const dt = new Date(d + 'T00:00:00');
        const month = dt.getMonth() + 1;
        const day = dt.getDate();
        const weekday = WEEKDAYS[dt.getDay()];
        const nNews = data.news ? data.news.length : 0;
        const nPapers = data.papers ? data.papers.length : 0;
        const nTools = data.tools ? data.tools.length : 0;
        return `
          <div class="archive-card" data-date="${d}">
            <span class="archive-date">${month} 月 ${day} 日</span>
            <span class="archive-label">${weekday}</span>
            <span class="archive-count">${nNews} 条资讯 · ${nPapers} 篇论文 · ${nTools} 款工具</span>
          </div>`;
      }).join('');

      // 绑定点击
      grid.querySelectorAll('.archive-card').forEach(card => {
        card.addEventListener('click', () => {
          switchToDate(card.dataset.date);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    // ============================================================
    // 日期切换
    // ============================================================
    let currentDateKey = '2026-03-20';

    function switchToDate(dateKey) {
      if (!dailyData[dateKey]) return;
      currentDateKey = dateKey;
      document.getElementById('currentDate').textContent = formatDateCN(dateKey);
      renderContent(dateKey);
      renderArchive(dateKey);
      renderCalendar();
    }

    // 前后日切换
    document.getElementById('prevDay').addEventListener('click', () => {
      const dates = getAvailableDates();
      const idx = dates.indexOf(currentDateKey);
      if (idx < dates.length - 1) {
        switchToDate(dates[idx + 1]);
      }
    });

    document.getElementById('nextDay').addEventListener('click', () => {
      const dates = getAvailableDates();
      const idx = dates.indexOf(currentDateKey);
      if (idx > 0) {
        switchToDate(dates[idx - 1]);
      }
    });

    // ============================================================
    // 日历选择器
    // ============================================================
    const calPanel = document.getElementById('calendarPanel');
    const calTrigger = document.getElementById('datePickerTrigger');
    let calViewYear = 2026;
    let calViewMonth = 2; // 0-indexed, 2 = March

    calTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      calPanel.classList.toggle('open');
      if (calPanel.classList.contains('open')) {
        const d = new Date(currentDateKey + 'T00:00:00');
        calViewYear = d.getFullYear();
        calViewMonth = d.getMonth();
        renderCalendar();
      }
    });

    document.addEventListener('click', (e) => {
      if (!calPanel.contains(e.target) && !calTrigger.contains(e.target)) {
        calPanel.classList.remove('open');
      }
    });

    document.getElementById('calMonthPrev').addEventListener('click', (e) => {
      e.stopPropagation();
      calViewMonth--;
      if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
      renderCalendar();
    });

    document.getElementById('calMonthNext').addEventListener('click', (e) => {
      e.stopPropagation();
      calViewMonth++;
      if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
      renderCalendar();
    });

    function renderCalendar() {
      document.getElementById('calMonthLabel').textContent = `${calViewYear} 年 ${calViewMonth + 1} 月`;
      const container = document.getElementById('calendarDays');
      const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
      const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
      const availDates = new Set(getAvailableDates());

      let html = '';
      // 填充空白
      for (let i = 0; i < firstDay; i++) {
        html += '<span class="cal-day empty"></span>';
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const key = `${calViewYear}-${String(calViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isAvailable = availDates.has(key);
        const isActive = key === currentDateKey;
        let cls = 'cal-day';
        if (isActive) cls += ' active';
        else if (isAvailable) cls += ' available';
        else cls += ' disabled';

        if (isAvailable) {
          html += `<span class="${cls}" data-date="${key}">${d}</span>`;
        } else {
          html += `<span class="${cls}">${d}</span>`;
        }
      }
      container.innerHTML = html;

      // 绑定日期点击
      container.querySelectorAll('.cal-day.available, .cal-day.active').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          switchToDate(el.dataset.date);
          calPanel.classList.remove('open');
        });
      });
    }

    // ============================================================
    // 侧边栏 & 滚动
    // ============================================================
    function initObserver() {
      const sections = document.querySelectorAll('.daily-section');
      const sidebarLinks = document.querySelectorAll('.sidebar-link');

      const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            sidebarLinks.forEach(link => {
              link.classList.toggle('active', link.dataset.section === id);
            });
          }
        });
      }, { rootMargin: '-80px 0px -60% 0px', threshold: 0 });

      sections.forEach(sec => obs.observe(sec));
    }

    // 侧边栏点击
    document.querySelectorAll('.sidebar-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.getElementById(link.dataset.section);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // ============================================================
    // 初始化
    // ============================================================
    renderContent(currentDateKey);
    renderArchive(currentDateKey);
    renderCalendar();
  </script>

</body>
</html>
