      <span class="mobile-toc-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> 论文导航</span>
      <button class="mobile-toc-close" onclick="toggleMobileToc()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>

  <script>
    // ============================================================
    // 数据驱动渲染：从 JSON 加载论文数据并自动生成页面
    // 新增论文只需编辑 /data/papers.json，无需修改此 HTML
    // ============================================================

    (async function() {
      // 1. 加载数据
      const resp = await fetch('../data/papers.json?v=20260329');
      const data = await resp.json();
      const sections = data.sections;

      // 2. 渲染侧边栏导航
      const sidebarNav = document.getElementById('sidebarNav');
      sidebarNav.innerHTML = sections.map((sec, i) => `
        <a href="#${sec.id}" class="sidebar-link${i === 0 ? ' active' : ''}" data-section="${sec.id}">
          <span class="sidebar-dot" style="background: ${sec.sidebarDot};"></span>
          <span>${sec.title}</span>
          <span class="sidebar-count">${sec.papers.length}</span>
        </a>
      `).join('');

      // 2b. 同步填充移动端目录
      const mobileTocList = document.getElementById('mobileTocList');
      if (mobileTocList) {
        mobileTocList.innerHTML = sections.map((sec, i) => `
          <a class="mobile-toc-item${i === 0 ? ' active' : ''}" data-section="${sec.id}" href="#${sec.id}">
            <span class="mobile-toc-dot" style="background:${sec.sidebarDot};"></span>
            <span>${sec.title}</span>
            <span class="mobile-toc-count">${sec.papers.length}</span>
          </a>
        `).join('');
        mobileTocList.querySelectorAll('.mobile-toc-item').forEach(item => {
          item.addEventListener('click', function(e) {
            e.preventDefault();
            const t = document.getElementById(this.dataset.section);
            if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
            toggleMobileToc();
          });
        });
      }

      // 3. 移除 loading skeleton 并渲染论文内容区域
      const papersContent = document.getElementById('papersContent');
      papersContent.innerHTML = sections.map(sec => `
        <div class="section-anchor" id="${sec.id}"></div>
        <div class="section-header">
          <div class="section-icon" style="background: ${sec.gradient};">${sec.icon}</div>
          <div>
            <h3 class="section-title">${sec.title}</h3>
            <p class="section-subtitle">${sec.subtitle}</p>
          </div>
        </div>
        <div class="paper-grid paper-grid-spaced">
          ${sec.papers.map(p => `
            <a class="paper-card" href="${p.url}" target="_blank" rel="noopener">
              <div class="paper-card-top">
                <span class="paper-year">${p.year}</span>
                <span class="paper-impact">${p.impact}</span>
              </div>
              <h3 class="paper-title">${p.title}</h3>
              <p class="paper-authors">${p.authors}</p>
              <p class="paper-source">${p.source}</p>
              <p class="paper-abstract">${p.abstract}</p>
              <div class="paper-tags">
                ${p.tags.map(t => `<span class="paper-tag ${t.color}">${t.text}</span>`).join('')}
              </div>
              <span class="paper-link-icon">↗</span>
            </a>
          `).join('')}
        </div>
      `).join('');

      // 4. 侧边目录高亮跟踪
      const sidebarLinks = document.querySelectorAll('.sidebar-link');
      const sectionEls = document.querySelectorAll('.section-anchor');

      function updateActiveLink() {
        let current = '';
        sectionEls.forEach(section => {
          const rect = section.getBoundingClientRect();
          if (rect.top <= 160) {
            current = section.id;
          }
        });
        sidebarLinks.forEach(link => {
          link.classList.remove('active');
          if (link.getAttribute('data-section') === current) {
            link.classList.add('active');
          }
        });
        // 同步移动端目录高亮
        document.querySelectorAll('.mobile-toc-item').forEach(item => {
          item.classList.toggle('active', item.dataset.section === current);
        });
      }

      window.addEventListener('scroll', updateActiveLink);
      updateActiveLink();

      // 5. 点击平滑滚动
      sidebarLinks.forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const targetId = this.getAttribute('data-section');
          const target = document.getElementById(targetId);
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });
    })();

    function toggleMobileToc() {
      document.getElementById('mobileTocOverlay').classList.toggle('active');
      document.getElementById('mobileTocPanel').classList.toggle('active');
    }
  </script>
  <!-- 返回顶部按钮 -->
  <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="返回顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <script>
  (function(){var btn=document.getElementById('backToTop');if(!btn)return;window.addEventListener('scroll',function(){btn.classList.toggle('visible',window.scrollY>400)},{passive:true});})();
  </script>

</body>
